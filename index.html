<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Aplicación web para la gestión de eventos, participantes e inscripciones desarrollada con HTML, CSS, JavaScript, Axios y json-server.">
    <meta name="keywords"
        content="eventos, participantes, inscripciones, CRUD, JavaScript, Axios, json-server, HTML, CSS, programación web">
    <meta name="author" content="Astorga Sheyla, Boixados Facundo, Lobo Juan David, Uncos Sebastian, Valverde Ignacio">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <title>Gestor de Eventos</title>
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2><span>Event</span>Hub</h2>
            <nav>
                <a href="#">Dashboard</a>
                <a href="#">Eventos</a>
                <a href="#">Participantes</a>
                <a href="#">Inscripciones</a>

            </nav>
        </aside>
        <main class="main-content">
            <header class="topbar">

            <section class="dashboard">
                <div class="card-dashboard">
